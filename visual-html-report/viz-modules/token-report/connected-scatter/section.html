<section>
  <div class="section-num">§ 55 · 路径散点</div>
  <h2 class="section-title">带箭头的连线散点（<em>Connected Scatter</em>）</h2>
  <p class="section-desc">普通散点图是静态快照；连接两点的箭头让读者看到"个体的运动方向"。这里画了 5 个项目从 2025 年 12 月到 2026 年 5 月在"stars × forks"空间中的轨迹。</p>
  
  <div class="svg-card">
    <svg viewBox="0 0 1000 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Connected scatter with arrows showing tool movement">
      <defs>
        <marker id="arr-vermillion" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L0,10 L9,5 z" fill="#c84630"/></marker>
        <marker id="arr-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L0,10 L9,5 z" fill="#2d4a7c"/></marker>
        <marker id="arr-forest" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L0,10 L9,5 z" fill="#3f6b3a"/></marker>
        <marker id="arr-ochre" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L0,10 L9,5 z" fill="#c89a47"/></marker>
        <marker id="arr-plum" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L0,10 L9,5 z" fill="#6b3a5a"/></marker>
      </defs>
      <!-- Axes -->
      <line x1="100" y1="400" x2="940" y2="400" stroke="#14110f" stroke-width="1"/>
      <line x1="100" y1="60" x2="100" y2="400" stroke="#14110f" stroke-width="1"/>
      <!-- Grid -->
      <g stroke="rgba(20,17,15,0.05)" stroke-width="1">
        <line x1="270" y1="60" x2="270" y2="400"/>
        <line x1="440" y1="60" x2="440" y2="400"/>
        <line x1="610" y1="60" x2="610" y2="400"/>
        <line x1="780" y1="60" x2="780" y2="400"/>
        <line x1="100" y1="320" x2="940" y2="320"/>
        <line x1="100" y1="240" x2="940" y2="240"/>
        <line x1="100" y1="160" x2="940" y2="160"/>
      </g>
      <!-- Axis labels -->
      <g font-family="JetBrains Mono" font-size="10" fill="#6b6058">
        <text x="100" y="420" text-anchor="middle">0</text>
        <text x="270" y="420" text-anchor="middle">40k</text>
        <text x="440" y="420" text-anchor="middle">80k</text>
        <text x="610" y="420" text-anchor="middle">120k</text>
        <text x="780" y="420" text-anchor="middle">160k</text>
        <text x="940" y="420" text-anchor="middle">200k</text>
        <text x="90" y="404" text-anchor="end">0</text>
        <text x="90" y="324" text-anchor="end">5k</text>
        <text x="90" y="244" text-anchor="end">10k</text>
        <text x="90" y="164" text-anchor="end">15k</text>
        <text x="90" y="84" text-anchor="end">20k</text>
      </g>
      <text x="520" y="450" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#6b6058" letter-spacing="0.1em">STARS →</text>
      <text x="60" y="230" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#6b6058" letter-spacing="0.1em" transform="rotate(-90 60 230)">FORKS →</text>
      
      <!-- OpenCode: Dec25 (90k, 12k) → May26 (160k, 18.8k) -->
      <line x1="482" y1="208" x2="775" y2="99" stroke="#c84630" stroke-width="2.5" marker-end="url(#arr-vermillion)" opacity="0.85"/>
      <circle cx="482" cy="208" r="6" fill="white" stroke="#c84630" stroke-width="2"/>
      <circle cx="775" cy="99" r="8" fill="#c84630"/>
      <text x="775" y="86" font-family="Source Serif 4" font-style="italic" font-size="13" fill="#c84630" text-anchor="middle" font-weight="500">OpenCode</text>
      
      <!-- Claude Code: Dec25 (75k, 14k) → May26 (123k, 20.3k) -->
      <line x1="419" y1="176" x2="623" y2="75" stroke="#2d4a7c" stroke-width="2.5" marker-end="url(#arr-indigo)" opacity="0.85"/>
      <circle cx="419" cy="176" r="6" fill="white" stroke="#2d4a7c" stroke-width="2"/>
      <circle cx="623" cy="75" r="8" fill="#2d4a7c"/>
      <text x="623" y="62" font-family="Source Serif 4" font-style="italic" font-size="13" fill="#2d4a7c" text-anchor="middle" font-weight="500">Claude Code</text>
      
      <!-- Gemini CLI: Dec25 (50k, 8k) → May26 (104k, 14k) -->
      <line x1="313" y1="272" x2="542" y2="176" stroke="#3f6b3a" stroke-width="2.5" marker-end="url(#arr-forest)" opacity="0.85"/>
      <circle cx="313" cy="272" r="6" fill="white" stroke="#3f6b3a" stroke-width="2"/>
      <circle cx="542" cy="176" r="8" fill="#3f6b3a"/>
      <text x="542" y="164" font-family="Source Serif 4" font-style="italic" font-size="13" fill="#3f6b3a" text-anchor="middle" font-weight="500">Gemini CLI</text>
      
      <!-- Cline: Dec25 (52k, 7.5k) → May26 (61.2k, 9k) -->
      <line x1="321" y1="280" x2="360" y2="256" stroke="#c89a47" stroke-width="2.5" marker-end="url(#arr-ochre)" opacity="0.85"/>
      <circle cx="321" cy="280" r="6" fill="white" stroke="#c89a47" stroke-width="2"/>
      <circle cx="360" cy="256" r="8" fill="#c89a47"/>
      <text x="385" y="259" font-family="Source Serif 4" font-style="italic" font-size="13" fill="#c89a47" font-weight="500">Cline</text>
      
      <!-- Aider: Dec25 (38k, 4k) → May26 (44.8k, 4.4k) -->
      <line x1="261" y1="336" x2="290" y2="330" stroke="#6b3a5a" stroke-width="2.5" marker-end="url(#arr-plum)" opacity="0.85"/>
      <circle cx="261" cy="336" r="6" fill="white" stroke="#6b3a5a" stroke-width="2"/>
      <circle cx="290" cy="330" r="8" fill="#6b3a5a"/>
      <text x="310" y="334" font-family="Source Serif 4" font-style="italic" font-size="13" fill="#6b3a5a" font-weight="500">Aider</text>
      
      <!-- Labels -->
      <text x="100" y="36" font-family="JetBrains Mono" font-size="10" fill="#6b6058" letter-spacing="0.1em">2025-12 ○ ─→ 2026-05 ●</text>
      <text x="940" y="36" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="#6b6058" letter-spacing="0.1em">SIX MONTHS · 4 个增长极</text>
    </svg>
  </div>
</section>

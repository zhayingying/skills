<section>
  <div class="section-num">§ 19 · 排名变化</div>
  <h2 class="section-title">斜率图：<em>六个月排名变化</em></h2>
  <p class="section-desc">2025年12月 vs 2026年5月。OpenCode 是这段时间最大的"上升星"——从第 5 跃升到第 1。Roo Code 因停服跌出前 10。</p>
  
  <div class="svg-card">
    <svg viewBox="0 0 800 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Slope chart showing rank changes from December 2025 to May 2026">
      <g font-family="JetBrains Mono" font-size="11" fill="#6b6058" letter-spacing="0.08em">
        <text x="240" y="40" text-anchor="end">2025年12月</text>
        <text x="560" y="40" text-anchor="end">2026年5月</text>
      </g>
      <!-- Vertical guide rules -->
      <line x1="240" y1="60" x2="240" y2="580" stroke="#14110f" stroke-width="0.8"/>
      <line x1="560" y1="60" x2="560" y2="580" stroke="#14110f" stroke-width="0.8"/>
      
      <!-- Slope lines and labels (10 rows) -->
      <g font-family="Source Serif 4" font-size="13" fill="#14110f">
        <!-- Claude Code: rank 1 → 2 -->
        <line x1="240" y1="90" x2="560" y2="140" stroke="#2d4a7c" stroke-width="1.5"/>
        <circle cx="240" cy="90" r="5" fill="#2d4a7c"/>
        <circle cx="560" cy="140" r="5" fill="#2d4a7c"/>
        <text x="230" y="95" text-anchor="end">1 · Claude Code</text>
        <text x="570" y="145">2 · Claude Code</text>
        
        <!-- Gemini CLI: rank 2 → 3 -->
        <line x1="240" y1="140" x2="560" y2="190" stroke="#2d4a7c" stroke-width="1.5"/>
        <circle cx="240" cy="140" r="5" fill="#2d4a7c"/>
        <circle cx="560" cy="190" r="5" fill="#2d4a7c"/>
        <text x="230" y="145" text-anchor="end">2 · Gemini CLI</text>
        <text x="570" y="195">3 · Gemini CLI</text>
        
        <!-- Codex: rank 3 → 4 -->
        <line x1="240" y1="190" x2="560" y2="240" stroke="#2d4a7c" stroke-width="1.5"/>
        <circle cx="240" cy="190" r="5" fill="#2d4a7c"/>
        <circle cx="560" cy="240" r="5" fill="#2d4a7c"/>
        <text x="230" y="195" text-anchor="end">3 · Codex CLI</text>
        <text x="570" y="245">4 · Codex CLI</text>
        
        <!-- OpenHands: 4 → 5 -->
        <line x1="240" y1="240" x2="560" y2="290" stroke="#3f6b3a" stroke-width="1.5"/>
        <circle cx="240" cy="240" r="5" fill="#3f6b3a"/>
        <circle cx="560" cy="290" r="5" fill="#3f6b3a"/>
        <text x="230" y="245" text-anchor="end">4 · OpenHands</text>
        <text x="570" y="295">5 · OpenHands</text>
        
        <!-- OpenCode 5 → 1 RISING STAR -->
        <line x1="240" y1="290" x2="560" y2="90" stroke="#c84630" stroke-width="3"/>
        <circle cx="240" cy="290" r="5" fill="#c84630"/>
        <circle cx="560" cy="90" r="7" fill="#c84630"/>
        <text x="230" y="295" text-anchor="end" font-weight="600">5 · OpenCode</text>
        <text x="570" y="95" font-weight="600" fill="#c84630">1 · OpenCode ↑</text>
        
        <!-- Open Interpreter 6 → 6 -->
        <line x1="240" y1="340" x2="560" y2="340" stroke="#6b6058" stroke-width="1" stroke-dasharray="3 3"/>
        <circle cx="240" cy="340" r="5" fill="#6b6058"/>
        <circle cx="560" cy="340" r="5" fill="#6b6058"/>
        <text x="230" y="345" text-anchor="end">6 · Open Interpreter</text>
        <text x="570" y="345">6 · Open Interpreter</text>
        
        <!-- Cline 7 → 7 -->
        <line x1="240" y1="390" x2="560" y2="390" stroke="#3f6b3a" stroke-width="1.5"/>
        <circle cx="240" cy="390" r="5" fill="#3f6b3a"/>
        <circle cx="560" cy="390" r="5" fill="#3f6b3a"/>
        <text x="230" y="395" text-anchor="end">7 · Cline</text>
        <text x="570" y="395">7 · Cline</text>
        
        <!-- Aider 8 → 8 -->
        <line x1="240" y1="440" x2="560" y2="440" stroke="#3f6b3a" stroke-width="1.5"/>
        <circle cx="240" cy="440" r="5" fill="#3f6b3a"/>
        <circle cx="560" cy="440" r="5" fill="#3f6b3a"/>
        <text x="230" y="445" text-anchor="end">8 · Aider</text>
        <text x="570" y="445">8 · Aider</text>
        
        <!-- Roo Code 9 → 12 FALLING -->
        <line x1="240" y1="490" x2="560" y2="590" stroke="#c84630" stroke-width="2" stroke-dasharray="4 3"/>
        <circle cx="240" cy="490" r="5" fill="#c84630"/>
        <circle cx="560" cy="590" r="5" fill="#c84630"/>
        <text x="230" y="495" text-anchor="end">9 · Roo Code</text>
        <text x="570" y="595" fill="#c84630">12 · Roo Code ↓ 停服</text>
        
        <!-- Continue 10 → 9 -->
        <line x1="240" y1="540" x2="560" y2="490" stroke="#3f6b3a" stroke-width="1.5"/>
        <circle cx="240" cy="540" r="5" fill="#3f6b3a"/>
        <circle cx="560" cy="490" r="5" fill="#3f6b3a"/>
        <text x="230" y="545" text-anchor="end">10 · Continue</text>
        <text x="570" y="495">9 · Continue ↑</text>
      </g>
    </svg>
  </div>
</section>

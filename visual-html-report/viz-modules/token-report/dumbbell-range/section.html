<section>
  <div class="section-num">§ 23 · 区间</div>
  <h2 class="section-title">哑铃图：<em>fork 比例对照</em></h2>
  <p class="section-desc">每个工具的左端 = 平均 fork/star 比例（5%），右端 = 该工具的实际比例。距离越大、越偏离行业均值。bolt.diy 因鼓励自建偏离最远；OpenCode 也明显偏高，反映真实工程使用。</p>
  
  <div class="svg-card">
    <svg viewBox="0 0 900 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dumbbell chart of fork-to-star ratios">
      <!-- Axis -->
      <line x1="220" y1="40" x2="220" y2="450" stroke="rgba(20,17,15,0.1)" stroke-width="0.5" stroke-dasharray="2 3"/>
      <text x="220" y="30" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#6b6058">5%（行业均值）</text>
      <g font-family="JetBrains Mono" font-size="9" fill="#6b6058">
        <text x="110" y="465" text-anchor="middle">0%</text>
        <text x="220" y="465" text-anchor="middle">5%</text>
        <text x="440" y="465" text-anchor="middle">15%</text>
        <text x="660" y="465" text-anchor="middle">25%</text>
        <text x="800" y="465" text-anchor="middle">30%</text>
      </g>
      
      <g font-family="Source Serif 4" font-size="13" fill="#14110f">
        <!-- bolt.diy 26.3% -->
        <text x="180" y="74" text-anchor="end">bolt.diy</text>
        <line x1="220" y1="70" x2="797" y2="70" stroke="#c89a47" stroke-width="2"/>
        <circle cx="220" cy="70" r="5" fill="#6b6058"/>
        <circle cx="797" cy="70" r="6" fill="#c89a47"/>
        <text x="810" y="74" font-family="JetBrains Mono" font-size="10" fill="#6b6058">26.3%</text>
        
        <!-- Kilo Code 13% -->
        <text x="180" y="114" text-anchor="end">Kilo Code</text>
        <line x1="220" y1="110" x2="506" y2="110" stroke="#3f6b3a" stroke-width="2"/>
        <circle cx="220" cy="110" r="5" fill="#6b6058"/>
        <circle cx="506" cy="110" r="6" fill="#3f6b3a"/>
        <text x="520" y="114" font-family="JetBrains Mono" font-size="10" fill="#6b6058">13.0%</text>
        
        <!-- Roo Code 13.3% -->
        <text x="180" y="154" text-anchor="end">Roo Code</text>
        <line x1="220" y1="150" x2="513" y2="150" stroke="#3f6b3a" stroke-width="2"/>

        <text x="393" y="434" font-family="JetBrains Mono" font-size="10" fill="#6b6058">7.3%</text>
      </g>
    </svg>
  </div>
</section>

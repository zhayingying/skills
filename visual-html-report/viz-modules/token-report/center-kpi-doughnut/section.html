<section>
  <div class="section-num">§ 52 · 中心 KPI 环</div>
  <h2 class="section-title">环形图 + 中心数字（<em>Donut with Centered KPI</em>）</h2>
  <p class="section-desc">环形图把核心数字放在中心、外围用环表达组成。三个并排时形成"指标卡"风格的细节大屏——比纯数字卡多一层"为什么是这个数"的解释。</p>
  
  <div class="donut-grid">
    <div class="donut-card">
      <div class="dlabel">维护方分布</div>
      <div class="dtitle">大厂 vs 社区</div>
      <div class="donut-wrap">
        <svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(20,17,15,0.06)" stroke-width="24"/>
          <!-- 4/18 bigtech = 22% -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#2d4a7c" stroke-width="24" stroke-dasharray="96.7 343.6" transform="rotate(-90 100 100)"/>
          <!-- 12/18 indie = 67% (start at 22%) -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#3f6b3a" stroke-width="24" stroke-dasharray="295.0 145.3" stroke-dashoffset="-96.7" transform="rotate(-90 100 100)"/>
          <!-- 1/18 foundation -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#a05a32" stroke-width="24" stroke-dasharray="24.5 415.8" stroke-dashoffset="-391.7" transform="rotate(-90 100 100)"/>
          <!-- 1/18 sunset -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#c84630" stroke-width="24" stroke-dasharray="24.5 415.8" stroke-dashoffset="-416.2" transform="rotate(-90 100 100)"/>
        </svg>
        <div class="donut-center">
          <div class="dnum">11<small>/18</small></div>
          <div class="dlbl">独立团队</div>
        </div>
      </div>
      <div class="donut-legend">
        <div class="lrow"><span class="lsw" style="background:#3f6b3a"></span>独立<span class="lval">11</span></div>
        <div class="lrow"><span class="lsw" style="background:#2d4a7c"></span>大厂<span class="lval">4</span></div>
        <div class="lrow"><span class="lsw" style="background:#a05a32"></span>基金会<span class="lval">1</span></div>
        <div class="lrow"><span class="lsw" style="background:#c84630"></span>停服<span class="lval">1</span></div>
      </div>
    </div>
    
    <div class="donut-card">
      <div class="dlabel">许可证</div>
      <div class="dtitle">商用友好度</div>
      <div class="donut-wrap">
        <svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(20,17,15,0.06)" stroke-width="24"/>
          <!-- Apache 2.0 = 9/18 = 50% -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#3f6b3a" stroke-width="24" stroke-dasharray="220.2 220.4" transform="rotate(-90 100 100)"/>
          <!-- MIT = 7/18 = 39% -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#c89a47" stroke-width="24" stroke-dasharray="171.3 269.3" stroke-dashoffset="-220.2" transform="rotate(-90 100 100)"/>
          <!-- AGPL = 1/18 -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#c84630" stroke-width="24" stroke-dasharray="24.5 415.8" stroke-dashoffset="-391.5" transform="rotate(-90 100 100)"/>
          <!-- Proprietary = 1/18 -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#4a5759" stroke-width="24" stroke-dasharray="24.5 415.8" stroke-dashoffset="-416.0" transform="rotate(-90 100 100)"/>
        </svg>
        <div class="donut-center">
          <div class="dnum">89<small>%</small></div>
          <div class="dlbl">商用友好</div>
        </div>
      </div>
      <div class="donut-legend">
        <div class="lrow"><span class="lsw" style="background:#3f6b3a"></span>Apache 2.0<span class="lval">9</span></div>
        <div class="lrow"><span class="lsw" style="background:#c89a47"></span>MIT<span class="lval">7</span></div>
        <div class="lrow"><span class="lsw" style="background:#c84630"></span>AGPL-3.0<span class="lval">1</span></div>
        <div class="lrow"><span class="lsw" style="background:#4a5759"></span>专有<span class="lval">1</span></div>
      </div>
    </div>
    
    <div class="donut-card">
      <div class="dlabel">核心语言</div>
      <div class="dtitle">技术栈分布</div>
      <div class="donut-wrap">
        <svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(20,17,15,0.06)" stroke-width="24"/>
          <!-- TS = 8/18 = 44% -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#2d4a7c" stroke-width="24" stroke-dasharray="195.7 244.9" transform="rotate(-90 100 100)"/>
          <!-- Python = 5/18 = 28% -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#c89a47" stroke-width="24" stroke-dasharray="122.3 318.3" stroke-dashoffset="-195.7" transform="rotate(-90 100 100)"/>
          <!-- Rust = 3/18 = 17% -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#a05a32" stroke-width="24" stroke-dasharray="73.4 367.2" stroke-dashoffset="-318.0" transform="rotate(-90 100 100)"/>
          <!-- Go = 2/18 = 11% -->
          <circle cx="100" cy="100" r="70" fill="none" stroke="#3f6b3a" stroke-width="24" stroke-dasharray="48.9 391.7" stroke-dashoffset="-391.4" transform="rotate(-90 100 100)"/>
        </svg>
        <div class="donut-center">
          <div class="dnum">44<small>%</small></div>
          <div class="dlbl">TypeScript</div>
        </div>
      </div>
      <div class="donut-legend">
        <div class="lrow"><span class="lsw" style="background:#2d4a7c"></span>TypeScript<span class="lval">8</span></div>
        <div class="lrow"><span class="lsw" style="background:#c89a47"></span>Python<span class="lval">5</span></div>
        <div class="lrow"><span class="lsw" style="background:#a05a32"></span>Rust<span class="lval">3</span></div>
        <div class="lrow"><span class="lsw" style="background:#3f6b3a"></span>Go / 混合<span class="lval">2</span></div>
      </div>
    </div>
  </div>
</section>

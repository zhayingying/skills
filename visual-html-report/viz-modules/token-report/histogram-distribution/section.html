  <h2 class="section-title">直方图（<em>Histogram</em>）</h2>
  <p class="section-desc">把数据划分成区间、看每个区间里的样本数量。和 §29 的箱型图最大区别：直方图直接给你看"形状"——是单峰、双峰、长尾还是均匀。</p>
  
  <div class="chart-card">
    <h3>项目按 stars 数的分布</h3>

  </div>

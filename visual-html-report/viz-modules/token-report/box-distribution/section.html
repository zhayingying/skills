<section>
  <div class="section-num">§ 29 · 分布</div>
  <h2 class="section-title">箱线图：<em>各语言阵营的 star 分布</em></h2>
  <p class="section-desc">把所有 18 个项目按主语言分组，画出 star 数的分布特征。能看出：Python 阵营整体水平最高（中位数最高，因为有 Open Interpreter / OpenHands / Aider 三个巨头），而 Rust 阵营整体偏小但更扎实。</p>

        <line x1="120" y1="40" x2="120" y2="380" stroke="#14110f" stroke-width="0.8"/>
        <text x="110" y="44" text-anchor="end">180k</text>
        <line x1="115" y1="40" x2="120" y2="40" stroke="#14110f"/>
        <text x="110" y="93" text-anchor="end">140k</text>
        <line x1="115" y1="90" x2="120" y2="90" stroke="#14110f"/>
        <text x="110" y="143" text-anchor="end">100k</text>
        <line x1="115" y1="140" x2="120" y2="140" stroke="#14110f"/>
        <text x="110" y="193" text-anchor="end">60k</text>
        <line x1="115" y1="190" x2="120" y2="190" stroke="#14110f"/>
        <text x="110" y="243" text-anchor="end">40k</text>
        <line x1="115" y1="240" x2="120" y2="240" stroke="#14110f"/>

        <line x1="115" y1="380" x2="120" y2="380" stroke="#14110f"/>
      </g>

      <g transform="translate(220,0)">

        <line x1="-50" y1="280" x2="50" y2="280" stroke="#2d4a7c" stroke-width="2.5"/>

<section>
  <div class="section-num">§ 38 · 漏斗</div>
  <h2 class="section-title">漏斗图：<em>从感兴趣到真活跃</em></h2>
  <p class="section-desc">五个阶段，对应"AI 编程类目的真实用户漏斗"：从听说过 → 试过 → 周活 → 月活付费 → 贡献者。每一层 = 上一层的子集。和柱状图相比，漏斗在视觉上强调"流失"。</p>
  
  <div class="viz-card">
    <div class="funnel-wrap">
      <div class="funnel-row">
        <div class="flabel"><strong>潜在用户</strong><span>知道这类工具存在</span></div>
        <div class="fbar-wrap"><div class="fbar" style="width:100%;background:linear-gradient(90deg,#c84630,#d35a44)">~12M</div></div>
        <div class="fval">100%</div>
      </div>
      <div class="funnel-row">
        <div class="flabel"><strong>试用过</strong><span>装过 ≥ 1 个工具</span></div>
        <div class="fbar-wrap"><div class="fbar" style="width:75%;background:linear-gradient(90deg,#d35a44,#dc6f5a)">~9M</div></div>
        <div class="fval">75%</div>
      </div>
      <div class="funnel-row">
        <div class="flabel"><strong>周活用户</strong><span>过去 7 天至少用了一次</span></div>
        <div class="fbar-wrap"><div class="fbar" style="width:42%;background:linear-gradient(90deg,#dc6f5a,#e58270)">~5M</div></div>
        <div class="fval">42%</div>
      </div>
      <div class="funnel-row">
        <div class="flabel"><strong>付费 / 高频</strong><span>有订阅或 token 计费</span></div>
        <div class="fbar-wrap"><div class="fbar" style="width:18%;background:linear-gradient(90deg,#e58270,#c89a47)">~2.2M</div></div>
        <div class="fval">18%</div>
      </div>
      <div class="funnel-row">
        <div class="flabel"><strong>贡献者</strong><span>提过 PR / Issue</span></div>
        <div class="fbar-wrap"><div class="fbar" style="width:0.6%;background:#c89a47">75k</div></div>
        <div class="fval">0.6%</div>
      </div>
    </div>
